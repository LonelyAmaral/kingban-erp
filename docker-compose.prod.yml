# Docker Compose Production — KING BAN ERP
# Uso: docker compose -f docker-compose.prod.yml up -d
#
# Variaveis de ambiente necessarias (.env):
#   DB_PASSWORD=<senha_segura>
#   SECRET_KEY=<chave_jwt_segura>
#   DOMAIN=erp.kingban.com.br (opcional)

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: kingban
      POSTGRES_USER: kingban
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kingban"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://kingban:${DB_PASSWORD}@db:5432/kingban
      DATABASE_URL_SYNC: postgresql://kingban:${DB_PASSWORD}@db:5432/kingban
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
