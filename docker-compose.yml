services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kingban
      POSTGRES_USER: kingban
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kingban123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kingban"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://kingban:${DB_PASSWORD:-kingban123}@db:5432/kingban
      DATABASE_URL_SYNC: postgresql://kingban:${DB_PASSWORD:-kingban123}@db:5432/kingban
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000

volumes:
  pgdata:
